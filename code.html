<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>محرك البيانات المحلي - Kinetiq Retail</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004253",
                        "primary-container": "#005b71",
                        "secondary": "#006c52",
                        "secondary-container": "#98FFD9",
                        "tertiary": "#5f2f00",
                        "background": "#f8f9fb",
                        "surface": "#ffffff",
                        "on-surface": "#191c1e",
                        "outline": "#70787d",
                        "error": "#ba1a1a"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-on-surface rtl">
    <main class="p-12 max-w-5xl mx-auto">
        <h1 class="text-2xl font-black mb-8">محرك SQLite - اختبار الأمان</h1>
        
        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm mb-8">
            <h3 class="font-bold mb-4">إضافة صنف (اختبار XSS)</h3>
            <div class="flex gap-4">
                <input id="item-name" type="text" class="flex-1 border-slate-200 rounded-lg text-sm" placeholder="أدخل اسم المنتج...">
                <button onclick="addNewItem()" class="bg-primary text-white px-6 py-2 rounded-lg font-bold">إضافة</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-right text-sm">
                <thead class="bg-slate-50 text-slate-500 font-bold uppercase text-[11px]">
                    <tr>
                        <th class="px-8 py-4 border-b">ID</th>
                        <th class="px-8 py-4 border-b">الاسم</th>
                        <th class="px-8 py-4 border-b">الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="data-table-body" class="divide-y divide-slate-50">
                    <tr><td colspan="3" class="px-8 py-12 text-center text-slate-400 italic">جاري تحميل SQLite...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        let db = null;

        async function initApp() {
            const SQL = await initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
            });
            db = new SQL.Database();
            db.run("CREATE TABLE test (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT)");
            refreshUI();
        }

        function addNewItem() {
            const name = document.getElementById('item-name').value;
            if (!name) return;
            db.run("INSERT INTO test (name) VALUES (?)", [name]);
            document.getElementById('item-name').value = '';
            refreshUI();
        }

        function refreshUI() {
            const results = db.exec("SELECT * FROM test ORDER BY id DESC");
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';

            if (results.length > 0) {
                results[0].values.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    
                    const tdId = document.createElement('td');
                    tdId.className = "px-8 py-4 font-mono text-slate-400";
                    tdId.textContent = `#${row[0]}`;
                    
                    const tdName = document.createElement('td');
                    tdName.className = "px-8 py-4 font-bold text-slate-800";
                    // Security Fix: Use textContent instead of innerHTML to prevent XSS
                    tdName.textContent = row[1];
                    
                    const tdActions = document.createElement('td');
                    tdActions.className = "px-8 py-4 text-center text-slate-300";
                    tdActions.textContent = "---";
                    
                    tr.appendChild(tdId);
                    tr.appendChild(tdName);
                    tr.appendChild(tdActions);
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="3" class="px-8 py-12 text-center text-slate-400 italic">لا توجد بيانات</td></tr>';
            }
        }

        initApp();
    </script>
</body>
</html>

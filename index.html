<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Kinetiq Retail - نظام إدارة المبيعات والمخزون</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#005B71",
                        "primary-container": "#004253",
                        "secondary": "#98FFD9",
                        "secondary-container": "#006c52",
                        "tertiary": "#F4A261",
                        "background": "#f8f9fb",
                        "surface": "#ffffff",
                        "on-surface": "#191c1e",
                        "outline": "#70787d",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "Noto Kufi Arabic"],
                        "body": ["Inter", "Noto Kufi Arabic"],
                        "label": ["Inter", "Noto Kufi Arabic"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Kufi Arabic', sans-serif;
        }
        h1, h2, h3, h4 {
            font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface rtl">
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
</body>
</html>

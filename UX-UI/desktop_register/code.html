<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetiq Retail - تسجيل مدير جديد</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#f2f4f6",
                    "surface-container-high": "#e6e8ea",
                    "outline-variant": "#bfc8cc",
                    "surface-container-highest": "#e1e3e4",
                    "on-error": "#ffffff",
                    "background": "#f8f9fb",
                    "secondary-fixed-dim": "#73d9b5",
                    "inverse-primary": "#8dd0e9",
                    "on-secondary": "#ffffff",
                    "surface-container": "#eceef0",
                    "tertiary-fixed-dim": "#ffb780",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#2f1400",
                    "primary-fixed-dim": "#8dd0e9",
                    "outline": "#70787d",
                    "surface-tint": "#19667d",
                    "on-surface-variant": "#40484c",
                    "on-secondary-fixed-variant": "#00513d",
                    "secondary": "#006c52",
                    "primary": "#004253",
                    "tertiary-container": "#804307",
                    "secondary-fixed": "#8ff6d0",
                    "inverse-on-surface": "#eff1f3",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "primary-container": "#005b71",
                    "on-secondary-container": "#007257",
                    "on-tertiary-fixed-variant": "#6f3800",
                    "tertiary": "#5f2f00",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#8ed1ea",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e1e3e4",
                    "on-primary-fixed": "#001f28",
                    "primary-fixed": "#b7eaff",
                    "on-tertiary-container": "#ffb882",
                    "tertiary-fixed": "#ffdcc4",
                    "surface": "#f8f9fb",
                    "on-surface": "#191c1e",
                    "on-primary-fixed-variant": "#004e61",
                    "on-secondary-fixed": "#002117",
                    "on-background": "#191c1e",
                    "surface-dim": "#d8dadc",
                    "secondary-container": "#8ff6d0",
                    "surface-bright": "#f8f9fb"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, .brand-logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 md:p-8">
<main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden border border-surface-container">
<!-- Left Side: Visual/Branding (Desktop Only) -->
<section class="hidden md:flex md:col-span-5 relative flex-col justify-between p-12 bg-primary overflow-hidden">
<div class="absolute inset-0 opacity-40">
<img class="w-full h-full object-cover" data-alt="modern retail store interior with clean lines and soft professional lighting highlighting premium merchandise" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD86xWl30ek3EipSar3yWCspwVDDdv50SJFL_YRHkkmyfNsmwvE_oVab95Qpana2Qe0qD1_PgJBloj4RRh-UqIfxQa6q7H8fVF7VoSU5Urqup7CAKOMYj6lPOj-VpcQCB0VY61JEXAAW2RzhV_z3HGXzIxdy8_Iu1mjdBfJFujTqmdN3skWO3G1LMyPhTZYoxlgoU6xwjcuk5uULoPXQlUKh-0uj5pk8N7IjM3Of0C78C4LCc5eT8kLz_ZjWBFa6mSnMf1TWHNEPp8"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-primary via-primary/60 to-transparent"></div>
<div class="relative z-10">
<div class="flex items-center gap-2 mb-8">
<span class="text-3xl font-black text-secondary-fixed tracking-tight brand-logo">Kinetiq Retail</span>
</div>
<h1 class="text-4xl font-bold text-white leading-tight mb-4">نظام إدارة التجزئة الذكي</h1>
<p class="text-secondary-fixed-dim text-lg max-w-sm">انضم إلى مجتمع المديرين المتميزين وقم بقيادة متجرك نحو النجاح مع أدواتنا التحليلية المتطورة.</p>
</div>
<div class="relative z-10 bg-white/10 backdrop-blur-md p-6 rounded-lg border border-white/20">
<div class="flex gap-4 items-center">
<div class="w-12 h-12 rounded-full bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
<div>
<p class="text-white font-semibold">لوحة تحكم شاملة</p>
<p class="text-on-primary-container text-sm">راقب المخزون والمبيعات في الوقت الفعلي.</p>
</div>
</div>
</div>
</section>
<!-- Right Side: Registration Form -->
<section class="md:col-span-7 p-8 md:p-16 flex flex-col justify-center">
<div class="max-w-xl mx-auto w-full">
<header class="mb-10 text-right">
<h2 class="text-3xl font-extrabold text-primary mb-2">إنشاء حساب جديد</h2>
<p class="text-outline">أدخل تفاصيلك للبدء كمسؤول في النظام</p>
</header>
<form class="grid grid-cols-1 md:grid-cols-2 gap-6" onsubmit="return false;">
<!-- Full Name -->
<div class="flex flex-col gap-1.5 md:col-span-2">
<label class="text-sm font-semibold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">person</span>
                            الاسم الكامل
                        </label>
<input class="w-full px-4 py-3 rounded bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="أدخل اسمك الثلاثي" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">mail</span>
                            البريد الإلكتروني
                        </label>
<input class="w-full px-4 py-3 rounded bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-right" dir="ltr" placeholder="name@company.com" type="email"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">call</span>
                            رقم الهاتف
                        </label>
<input class="w-full px-4 py-3 rounded bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-right" dir="ltr" placeholder="+966 5X XXX XXXX" type="tel"/>
</div>
<!-- Role Selection -->
<div class="flex flex-col gap-1.5 md:col-span-2">
<label class="text-sm font-semibold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">badge</span>
                            الدور الوظيفي
                        </label>
<div class="grid grid-cols-2 gap-4">
<label class="relative flex items-center justify-between p-4 border border-outline-variant rounded cursor-pointer hover:bg-surface-container transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-fixed/20">
<span class="font-medium text-on-surface">مدير</span>
<input class="w-4 h-4 text-primary border-outline-variant focus:ring-primary" name="role" type="radio" value="manager"/>
</label>
<label class="relative flex items-center justify-between p-4 border border-outline-variant rounded cursor-pointer hover:bg-surface-container transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-fixed/20">
<span class="font-medium text-on-surface">مساعد مدير</span>
<input class="w-4 h-4 text-primary border-outline-variant focus:ring-primary" name="role" type="radio" value="assistant"/>
</label>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
                            كلمة المرور
                        </label>
<input class="w-full px-4 py-3 rounded bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-right" dir="ltr" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">verified_user</span>
                            تأكيد كلمة المرور
                        </label>
<input class="w-full px-4 py-3 rounded bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-right" dir="ltr" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<div class="md:col-span-2 mt-4">
<button class="w-full bg-primary text-white py-4 rounded font-bold text-lg hover:bg-primary-container active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2" type="submit">
                            تسجيل الحساب
                            <span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
</form>
<footer class="mt-8 text-center">
<p class="text-on-surface-variant">
                        لديك حساب بالفعل؟
                        <a class="text-primary font-bold hover:underline" href="#">تسجيل الدخول</a>
</p>
</footer>
</div>
</section>
</main>
<!-- Decorative shapes for depth -->
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-secondary-fixed-dim/20 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-tertiary-fixed/20 rounded-full blur-3xl -z-10"></div>
</body></html>
